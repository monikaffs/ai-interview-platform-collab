<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Hire Premium</title>
    <meta name="description" content="Sign in to AI Hire and ace your next technical interview with AI-powered coaching.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <style>
        :root {
            --bg-deep: #020617;
            --card-surface: #0f172a;
            --accent-main: #0ea5e9;
            --accent-navy: #1e40af;
            --text-dim: #94a3b8;
            --input-bg: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e3a8a, #0c4a6e, #020617);
            background-size: 400% 400%;
            animation: auroraMovement 15s ease infinite;
            overflow: hidden;
        }

        @keyframes auroraMovement {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-card-premium {
            background: rgba(15, 23, 42, 0.96);
            width: 100%;
            max-width: 520px;
            padding: 65px 55px;
            border-radius: 42px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -1.5px;
        }
        .brand-logo span { color: var(--accent-main); }

        h1 { color: white; font-size: 2.1rem; margin: 0 0 12px 0; font-weight: 800; }
        .subtitle { color: var(--text-dim); margin-bottom: 45px; font-size: 1.05rem; }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            transition: 0.3s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.07);
            padding: 18px 20px 18px 60px;
            border-radius: 18px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-main);
            background: #000000;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.15);
        }

        .primary-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-navy) 0%, var(--accent-main) 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.25);
        }

        .primary-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px rgba(14, 165, 233, 0.4);
        }

        .primary-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .premium-divider {
            position: relative;
            margin: 45px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0f172a;
            padding: 0 25px;
            color: #475569;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 4px;
        }

        .google-btn-premium {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .google-btn-premium:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-main);
            transform: scale(1.02);
        }

        .google-btn-premium:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .footer-link {
            margin-top: 45px;
            color: var(--text-dim);
            font-size: 1rem;
        }

        .footer-link a {
            color: var(--accent-main);
            text-decoration: none;
            font-weight: 700;
            margin-left: 8px;
            transition: 0.3s;
        }

        .footer-link a:hover {
            text-shadow: 0 0 15px var(--accent-main);
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-card-premium">
        <a href="/dashboard" style="text-decoration:none;"><div class="brand-logo">AI Hire<span>.</span></div></a>
        <h1>Welcome Back</h1>
        <p class="subtitle">Ace your interviews with AI.</p>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="primary-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="premium-divider"><span>OR</span></div>

        <!-- FIX: onclick calls handleGoogleLogin which is defined below -->
        <button type="button" class="google-btn-premium" id="googleBtn" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22" alt="Google">
            Sign in with Google
        </button>

        <div class="footer-link">
            Don't have an account? <a href="/signup">Sign Up</a>
        </div>
    </div>

    <!-- Step 1: Load Supabase SDK FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Step 2: Initialize ONE Supabase client (store on window to share across scripts)
        // The CDN exposes `supabase` as the library namespace, not the client
        const _supabaseLib = window.supabase; // the CDN library object
        const _client = _supabaseLib.createClient(
            'https://isofuilekbgleahrxnkc.supabase.co',
            'sb_publishable_M7ZeZgexKOn82r8cXzfxdw_ZRNikdVp'
        );
        // Overwrite window.supabase with the actual client instance
        window.supabase = _client;

        // --- Helper: show inline error ---
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function clearError() {
            const el = document.getElementById('errorMsg');
            el.style.display = 'none';
        }

        // --- Helper: sync Supabase user to Flask session ---
        async function syncWithFlask(user, name) {
            const res = await fetch('/api/set_session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: user.id,
                    email: user.email,
                    name: name || user.user_metadata?.full_name || 'User'
                })
            });
            return res.ok;
        }

        // --- Google Login ---
        // FIX: Function name matches the onclick attribute above
        async function handleGoogleLogin() {
            clearError();
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Redirecting...';

            const { error } = await window.supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // MUST match exactly what you added in Supabase Dashboard → Auth → URL Configuration
                    redirectTo: window.location.origin + '/auth/callback'
                }
            });

            if (error) {
                showError('Google Login Failed: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22" alt="Google"> Sign in with Google';
            }
            // If no error, Supabase handles the redirect automatically — do NOT navigate here
        }

        // --- Email / Password Login ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing In...';

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError('Login Failed: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
                return;
            }

            // FIX: Sync with Flask BEFORE redirecting
            const ok = await syncWithFlask(data.user);
            if (ok) {
                window.location.href = '/dashboard';
            } else {
                showError('Session sync failed. Please try again.');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
